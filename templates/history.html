<!DOCTYPE html>
<html>
<head>
    <title>Scan History</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 60px auto;
            padding: 20px;
        }

        h1 {
            font-size: 36px;
            letter-spacing: 2px;
        }

        a {
            color: #0066cc;
            font-size: 18px;
        }

        .scan {
            margin-top: 25px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        pre {
            background: #111;
            color: #00ff88;
            padding: 20px;
            overflow-x: auto;
            white-space: pre-wrap;
            border-radius: 8px;
        }

        .empty {
            margin-top: 20px;
            color: gray;
        }
    </style>
</head>
<body>

    <h1>Scan History</h1>

    <a href="/">Back to scanner</a>

    {% if files %}
        {% for file in files %}
            <div class="scan">
                <h3>{{ file.name }}</h3>
                <p>{{ file.time }}</p>

                {% if file.content %}
                    <pre>{{ file.content }}</pre>
                {% else %}
                    <p>No result content.</p>
                {% endif %}
            </div>
        {% endfor %}
    {% else %}
        <p class="empty">No scans yet.</p>
    {% endif %}

</body>
</html>
