<!DOCTYPE html>
<html>
<head>
    <title>Scan History</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: .5rem; text-align: left; font-size: .9rem; }
        th { background: #f5f5f5; }
        a { color: #1976d2; }
    </style>
</head>
<body>
    <h1>Scan History</h1>
    <p><a href="{{ url_for('index') }}">New scan</a></p>

    {% if scans %}
        <table>
            <tr><th>Date (UTC)</th><th>Target</th><th>Findings</th><th>Report</th></tr>
            {% for s in scans %}
                <tr>
                    <td>{{ s.timestamp }}</td>
                    <td>{{ s.target }}</td>
                    <td>{{ s.total }}</td>
                    <td><a href="{{ url_for('report', scan_id=s.scan_id) }}">View</a></td>
                </tr>
            {% endfor %}
        </table>
    {% else %}
        <p>No scans yet.</p>
    {% endif %}
</body>
</html>
